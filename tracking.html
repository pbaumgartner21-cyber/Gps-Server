<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PNT GPS</title>

  <style>

    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body {
      background:#050816;
      color:white;
      font-family:Arial,sans-serif;
      min-height:100vh;
      padding:25px;
    }

    .container {
      max-width:700px;
      margin:auto;
    }

    .card {
      background:#0F172A;
      border-radius:28px;
      padding:30px;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 0 30px rgba(168,85,247,0.15);
    }

    h1 {
      font-size:42px;
      margin-bottom:15px;
      background:linear-gradient(90deg,#A855F7,#EC4899);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle {
      color:#94A3B8;
      margin-bottom:30px;
      line-height:1.7;
    }

    .stats {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    .stat {
      background:#111827;
      border-radius:18px;
      padding:20px;
    }

    .label {
      color:#94A3B8;
      font-size:13px;
      margin-bottom:10px;
    }

    .value {
      font-size:28px;
      font-weight:bold;
    }

    .buttons {
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:25px;
    }

    button {
      border:none;
      border-radius:16px;
      padding:16px 22px;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .start {
      background:linear-gradient(90deg,#7C3AED,#EC4899);
    }

    .pause {
      background:#F59E0B;
    }

</html>
