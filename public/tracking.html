<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PNT GPS</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

body{

  margin:0;
  font-family:Arial,sans-serif;
  background:#050816;
  color:white;
}

#map{

  height:60vh;
  width:100%;
}

.panel{

  padding:25px;
}

h1{

  font-size:42px;

  background:linear-gradient(
    90deg,
    #A855F7,
    #EC4899
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.buttons{

  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:20px;
}

button{

  border:none;
  padding:16px 22px;
  border-radius:14px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.start{
  background:#7C3AED;
}

.pause{
  background:#F59E0B;
}

.stop{
  background:#EF4444;
}

.stats{

  margin-top:20px;
  line-height:2;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="panel">

  <h1>PNT GPS</h1>

  <div class="buttons">

    <button
      class="start"
      onclick="startTracking()">

      Démarrer

    </button>

    <button
      class="pause"
      onclick="pauseTracking()">

      Pause

    </button>

    <button
      class="stop"
      onclick="stopTracking()">

      Terminer

    </button>

  </div>

  <div class="stats">

    Temps :
    <span id="time">0 min</span>

    <br>

    Distance :
    <span id="distance">0 km</span>

    <br>

    Points GPS :
    <span id="points">0</span>

  </div>

</div>

<script>

const map = L.map('map').setView(
  [47.322,5.041],
  13
);

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    attribution:'© OpenStreetMap'
  }
).addTo(map);

let polyline = L.polyline(
  [],
  {
    color:'#A855F7',
    weight:5
  }
).addTo(map);

let tracking = false;
let paused = false;
let watchId = null;

let startTime = null;

let totalDistance = 0;
let points = 0;

let lastPosition = null;

function calculateDistance(lat1, lon1, lat2, lon2){

  const R = 6371;

  const dLat =
    (lat2-lat1) * Math.PI/180;

  const dLon =
    (lon2-lon1) * Math.PI/180;

  const a =

    Math.sin(dLat/2) *
    Math.sin(dLat/2)

    +

    Math.cos(lat1*Math.PI/180)

    *

    Math.cos(lat2*Math.PI/180)

    *

    Math.sin(dLon/2)

    *

    Math.sin(dLon/2);

  const c =
    2 * Math.atan2(
      Math.sqrt(a),
      Math.sqrt(1-a)
    );

  return R * c;
}

function updateTime(){

  if(!tracking || paused) return;

  const seconds =
    Math.floor(
      (Date.now()-startTime)/1000
    );

  const minutes =
    Math.floor(seconds/60);

  document.getElementById("time")
    .innerText = minutes + " min";
}

setInterval(updateTime,1000);

function startTracking(){

  if(tracking) return;

  tracking = true;

  paused = false;

  startTime = Date.now();

  watchId =
    navigator.geolocation.watchPosition(

    async(position)=>{

      if(paused) return;

      const lat =
        position.coords.latitude;

      const lng =
        position.coords.longitude;

      polyline.addLatLng([lat,lng]);

      map.setView([lat,lng],17);

      if(lastPosition){

        totalDistance +=
          calculateDistance(

            lastPosition.lat,
            lastPosition.lng,

            lat,
            lng
          );
      }

      lastPosition = {
        lat,
        lng
      };

      points++;

      document.getElementById(
        "distance"
      ).innerText =
        totalDistance.toFixed(2)
        + " km";

      document.getElementById(
        "points"
      ).innerText =
        points;

      await fetch("/gps",{

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          lat,
          lng,
          distance:totalDistance,
          points,
          timestamp:new Date()

        })

      });

    },

    (error)=>{

      alert(error.message);

    },

    {

      enableHighAccuracy:true,
      maximumAge:0,
      timeout:5000

    }

  );
}

function pauseTracking(){

  paused = true;
}

function stopTracking(){

  tracking = false;

  navigator.geolocation.clearWatch(
    watchId
  );

  alert("Mission terminée");
}

</script>

</body>
</html>
