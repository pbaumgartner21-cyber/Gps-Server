<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PNT GPS Tracking</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script
src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
</script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:Arial,sans-serif;

  background:#050816;

  color:white;

  overflow-x:hidden;
}

.container{

  max-width:1200px;

  margin:auto;

  padding:25px;
}

.hero{

  background:#0F172A;

  border-radius:32px;

  padding:35px;

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 0 50px rgba(168,85,247,0.2);
}

h1{

  font-size:64px;

  margin-bottom:15px;

  background:
    linear-gradient(
      90deg,
      #A855F7,
      #EC4899
    );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.description{

  color:#CBD5E1;

  line-height:1.7;

  font-size:18px;
}

.stats{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

  gap:20px;

  margin-top:35px;
}

.stat-card{

  background:#111827;

  padding:24px;

  border-radius:24px;

  border:1px solid rgba(255,255,255,0.05);
}

.stat-label{

  color:#94A3B8;

  margin-bottom:10px;
}

.stat-value{

  font-size:36px;

  font-weight:bold;
}

.buttons{

  display:flex;

  gap:15px;

  flex-wrap:wrap;

  margin-top:35px;
}

button{

  border:none;

  padding:18px 26px;

  border-radius:18px;

  color:white;

  font-size:16px;

  font-weight:bold;

  cursor:pointer;

  transition:0.3s;
}

button:hover{

  transform:translateY(-3px);
}

.start{

  background:
    linear-gradient(
      90deg,
      #7C3AED,
      #EC4899
    );
}

.pause{
  background:#F59E0B;
}

.resume{
  background:#10B981;
}

.stop{
  background:#EF4444;
}

#status{

  margin-top:30px;

  background:#111827;

  padding:22px;

  border-radius:20px;

  color:#CBD5E1;
}

#map{

  height:500px;

  width:100%;

  margin-top:35px;

  border-radius:28px;

  overflow:hidden;

  border:1px solid rgba(255,255,255,0.08);
}

#summary{

  margin-top:35px;
}

.summary-card{

  background:#111827;

  border-radius:28px;

  padding:30px;

  border:1px solid rgba(255,255,255,0.08);
}

.summary-card h2{

  font-size:38px;

  margin-bottom:20px;
}

.summary-card p{

  margin-bottom:12px;

  color:#CBD5E1;

  font-size:17px;
}

@media(max-width:768px){

  h1{
    font-size:46px;
  }

  .buttons{
    flex-direction:column;
  }

  button{
    width:100%;
  }

  #map{
    height:400px;
  }
}

</style>

</head>

<body>

<div class="container">

  <div class="hero">

    <h1>PNT GPS</h1>

    <div class="description">

      Système professionnel de suivi GPS
      des tournées PNT Fly Dijon.

    </div>

    <div class="stats">

      <div class="stat-card">

        <div class="stat-label">
          Temps
        </div>

        <div class="stat-value" id="time">
          0 min
        </div>

      </div>

      <div class="stat-card">

        <div class="stat-label">
          Distance
        </div>

        <div class="stat-value" id="distance">
          0 km
        </div>

      </div>

      <div class="stat-card">

        <div class="stat-label">
          Vitesse
        </div>

        <div class="stat-value" id="speed">
          0 km/h
        </div>

      </div>

      <div class="stat-card">

        <div class="stat-label">
          Vitesse moyenne
        </div>

        <div class="stat-value" id="avgSpeed">
          0 km/h
        </div>

      </div>

      <div class="stat-card">

        <div class="stat-label">
          Vitesse max
        </div>

        <div class="stat-value" id="maxSpeed">
          0 km/h
        </div>

      </div>

      <div class="stat-card">

        <div class="stat-label">
          Points GPS
        </div>

        <div class="stat-value" id="points">
          0
        </div>

      </div>

    </div>

    <div class="buttons">

      <button
      class="start"
      onclick="startTracking()">

        Démarrer

      </button>

      <button
      class="pause"
      onclick="pauseTracking()">

        Pause

      </button>

      <button
      class="resume"
      onclick="resumeTracking()">

        Reprendre

      </button>

      <button
      class="stop"
      onclick="stopTracking()">

        Terminer

      </button>

    </div>

    <div id="status">

      GPS inactif.

    </div>

    <div id="map"></div>

    <div id="summary"></div>

  </div>

</div>

<script>

const map = L.map('map').setView(
  [47.322,5.041],
  13
);

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    attribution:'© OpenStreetMap'
  }
).addTo(map);

let polyline = L.polyline(
  [],
  {
    color:'#A855F7',
    weight:5
  }
).addTo(map);

let tracking = false;
let paused = false;

let watchId = null;

let startTime = null;

let totalDistance = 0;

let points = 0;

let lastPosition = null;

let maxSpeed = 0;

let totalSpeed = 0;

let speedSamples = 0;

let gpsHistory = [];

function calculateDistance(
  lat1,
  lon1,
  lat2,
  lon2
){

  const R = 6371;

  const dLat =
    (lat2-lat1) * Math.PI/180;

  const dLon =
    (lon2-lon1) * Math.PI/180;

  const a =

    Math.sin(dLat/2)
    *
    Math.sin(dLat/2)

    +

    Math.cos(lat1*Math.PI/180)

    *

    Math.cos(lat2*Math.PI/180)

    *

    Math.sin(dLon/2)

    *

    Math.sin(dLon/2);

  const c =

    2 * Math.atan2(
      Math.sqrt(a),
      Math.sqrt(1-a)
    );

  return R * c;
}

function updateTime(){

  if(!tracking || paused)
  return;

  const seconds =

    Math.floor(
      (Date.now()-startTime)
      / 1000
    );

  const minutes =
    Math.floor(seconds/60);

  document.getElementById("time")
  .innerText =
    minutes + " min";
}

setInterval(updateTime,1000);

function startTracking(){

  if(tracking) return;

  tracking = true;

  paused = false;

  startTime = Date.now();

  document.getElementById("status")
  .innerText =
    "Tracking GPS actif...";

  watchId =
    navigator.geolocation.watchPosition(

    async(position)=>{

      if(paused) return;

      const lat =
        position.coords.latitude;

      const lng =
        position.coords.longitude;

      const speed =

        position.coords.speed

        ?

        (
          position.coords.speed
          * 3.6
        ).toFixed(1)

        :

        0;

      polyline.addLatLng([
        lat,
        lng
      ]);

      map.setView([
        lat,
        lng
      ],17);

      gpsHistory.push({

        lat,
        lng,
        speed,
        time:new Date()

      });

      if(speed > maxSpeed){

        maxSpeed = speed;
      }

      totalSpeed +=
        Number(speed);

      speedSamples++;

      const averageSpeed =

        totalSpeed
        /
        speedSamples;

      if(lastPosition){

        totalDistance +=
          calculateDistance(

            lastPosition.lat,
            lastPosition.lng,

            lat,
            lng
          );
      }

      lastPosition = {
        lat,
        lng
      };

      points++;

      document.getElementById(
        "distance"
      ).innerText =

        totalDistance.toFixed(2)
        + " km";

      document.getElementById(
        "speed"
      ).innerText =

        speed + " km/h";

      document.getElementById(
        "avgSpeed"
      ).innerText =

        averageSpeed.toFixed(1)
        + " km/h";

      document.getElementById(
        "maxSpeed"
      ).innerText =

        maxSpeed
        + " km/h";

      document.getElementById(
        "points"
      ).innerText =
        points;

      await fetch("/gps",{

        method:"POST",

        headers:{
          "Content-Type":
          "application/json"
        },

        body:JSON.stringify({

          lat,
          lng,
          speed,
          distance:totalDistance,
          points,
          timestamp:new Date()

        })

      });

    },

    (error)=>{

      alert(error.message);

    },

    {

      enableHighAccuracy:true,
      maximumAge:0,
      timeout:5000

    }

  );
}

function pauseTracking(){

  paused = true;

  document.getElementById("status")
  .innerText =
    "Tracking en pause.";
}

function resumeTracking(){

  paused = false;

  document.getElementById("status")
  .innerText =
    "Tracking repris.";
}

function stopTracking(){

  tracking = false;

  navigator.geolocation.clearWatch(
    watchId
  );

  document.getElementById("status")
  .innerText =
    "Mission terminée.";

  const duration =

    Math.floor(
      (
        Date.now()
        -
        startTime
      )
      /
      1000
      /
      60
    );

  const averageSpeed =

    totalSpeed
    /
    speedSamples;

  document.getElementById(
    "summary"
  ).innerHTML =

  `
  <div class="summary-card">

    <h2>
      Résumé de tournée
    </h2>

    <p>
      Temps total :
      ${duration} min
    </p>

    <p>
      Distance :
      ${totalDistance.toFixed(2)} km
    </p>

    <p>
      Vitesse moyenne :
      ${averageSpeed.toFixed(1)} km/h
    </p>

    <p>
      Vitesse max :
      ${maxSpeed} km/h
    </p>

    <p>
      Points GPS :
      ${points}
    </p>

    <button
      class="start"
      onclick="exportPDF()"
      style="margin-top:25px;"
    >

      Export PDF

    </button>

  </div>
  `;
}

async function exportPDF(){

  const { jsPDF } =
    window.jspdf;

  const doc =
    new jsPDF();

  doc.setFontSize(26);

  doc.text(
    "PNT Fly Dijon",
    20,
    20
  );

  doc.setFontSize(14);

  doc.text(
    "Distance : "
    +
    totalDistance.toFixed(2)
    +
    " km",
    20,
    50
  );

  doc.text(
    "Points GPS : "
    +
    points,
    20,
    65
  );

  doc.text(
    "Vitesse max : "
    +
    maxSpeed
    +
    " km/h",
    20,
    80
  );

  doc.text(
    "Date : "
    +
    new Date().toLocaleString(),
    20,
    95
  );

  doc.save(
    "pnt-tracking.pdf"
  );
}

</script>

</body>
</html>
