<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PNT GPS</title>

  <style>

    body {
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
      background:#050816;
      color:white;
    }

    .container {

      max-width:900px;
      margin:auto;
      padding:30px;
    }

    .card {

      background:#0F172A;
      border-radius:30px;
      padding:40px;

      border:1px solid rgba(255,255,255,0.08);

      box-shadow:
        0 0 40px rgba(168,85,247,0.2);
    }

    h1 {

      font-size:60px;

      margin-bottom:20px;

      background:linear-gradient(
        90deg,
        #A855F7,
        #EC4899
      );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    p {

      color:#CBD5E1;

      line-height:1.7;

      font-size:18px;
    }

    .stats {

      display:grid;

      grid-template-columns:
        repeat(auto-fit,minmax(200px,1fr));

      gap:20px;

      margin-top:40px;
    }

    .stat {

      background:#111827;

      border-radius:20px;

      padding:25px;
    }

    .label {

      color:#94A3B8;

      margin-bottom:10px;
    }

    .value {

      font-size:34px;

      font-weight:bold;
    }

    .buttons {

      display:flex;

      gap:15px;

      flex-wrap:wrap;

      margin-top:35px;
    }

    button {

      border:none;

      padding:18px 24px;

      border-radius:16px;

      color:white;

      font-size:16px;

      font-weight:bold;

      cursor:pointer;
    }

    .start {
      background:linear-gradient(
        90deg,
        #7C3AED,
        #EC4899
      );
    }

    .pause {
      background:#F59E0B;
    }

    .resume {
      background:#10B981;
    }

    .stop {
      background:#EF4444;
    }

    #status {

      margin-top:30px;

      background:#111827;

      padding:20px;

      border-radius:18px;

      color:#CBD5E1;
    }

  </style>

</head>

<body>

<div class="container">

  <div class="card">

    <h1>PNT GPS</h1>

    <p>
      Système professionnel de suivi GPS des tournées.
    </p>

    <div class="stats">

      <div class="stat">
        <div class="label">Temps</div>
        <div class="value" id="time">0 min</div>
      </div>

      <div class="stat">
        <div class="label">Distance</div>
        <div class="value" id="distance">0 km</div>
      </div>

      <div class="stat">
        <div class="label">Vitesse</div>
        <div class="value" id="speed">0 km/h</div>
      </div>

      <div class="stat">
        <div class="label">Points GPS</div>
        <div class="value" id="points">0</div>
      </div>

    </div>

    <div class="buttons">

      <button class="start" onclick="startTracking()">
        Démarrer
      </button>

      <button class="pause" onclick="pauseTracking()">
        Pause
      </button>

      <button class="resume" onclick="resumeTracking()">
        Reprendre
      </button>

      <button class="stop" onclick="stopTracking()">
        Terminer
      </button>

    </div>

    <div id="status">
      GPS inactif.
    </div>

  </div>

</div>

<script>

let tracking = false;
let paused = false;
let watchId = null;

let startTime = null;
let points = 0;
let totalDistance = 0;

let lastPosition = null;

function calculateDistance(lat1, lon1, lat2, lon2) {

  const R = 6371;

  const dLat = (lat2-lat1) * Math.PI / 180;
  const dLon = (lon2-lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  const c =
    2 * Math.atan2(
      Math.sqrt(a),
      Math.sqrt(1-a)
    );

  return R * c;
}

function updateTime() {

  if(!tracking || paused) return;

  const seconds =
    Math.floor((Date.now() - startTime) / 1000);

  const minutes =
    Math.floor(seconds / 60);

  document.getElementById("time").innerText =
    minutes + " min";
}

setInterval(updateTime,1000);

function startTracking() {

  if(tracking) return;

  tracking = true;
  paused = false;

  startTime = Date.now();

  document.getElementById("status").innerText =
    "Tracking GPS actif...";

  watchId = navigator.geolocation.watchPosition(

    async (position) => {

      if(paused) return;

      const lat =
        position.coords.latitude;

      const lng =
        position.coords.longitude;

      const speed =
        position.coords.speed
          ? (position.coords.speed * 3.6).toFixed(1)
          : 0;

      if(lastPosition) {

        totalDistance += calculateDistance(
          lastPosition.lat,
          lastPosition.lng,
          lat,
          lng
        );
      }

      lastPosition = { lat, lng };

      points++;

      document.getElementById("distance").innerText =
        totalDistance.toFixed(2) + " km";

      document.getElementById("speed").innerText =
        speed + " km/h";

      document.getElementById("points").innerText =
        points;

      await fetch("/gps", {

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          lat,
          lng,
          speed,
          points,
          distance:totalDistance,
          timestamp:new Date()

        })

      });

    },

    (error) => {

      document.getElementById("status").innerText =
        error.message;
    },

    {
      enableHighAccuracy:true,
      maximumAge:0,
      timeout:5000
    }

  );
}

function pauseTracking() {

  paused = true;

  document.getElementById("status").innerText =
    "Tracking en pause.";
}

function resumeTracking() {

  paused = false;

  document.getElementById("status").innerText =
    "Tracking repris.";
}

function stopTracking() {

  tracking = false;

  navigator.geolocation.clearWatch(watchId);

  document.getElementById("status").innerText =
    "Mission terminée.";
}

</script>

</body>
</html>
