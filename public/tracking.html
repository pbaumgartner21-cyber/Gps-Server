<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PNT GPS Tracking</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script
src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
</script>

<script
src="https://html2canvas.hertzen.com/dist/html2canvas.min.js">
</script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:Inter,Arial,sans-serif;

  background:
    linear-gradient(
      180deg,
      #07111F 0%,
      #0B1220 100%
    );

  color:white;

  overflow-x:hidden;
}

.container{

  max-width:1250px;

  margin:auto;

  padding:25px;
}

.hero{

  background:
    rgba(15,23,42,0.82);

  backdrop-filter:blur(14px);

  border-radius:34px;

  padding:35px;

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 0 60px rgba(99,102,241,0.15);
}

.top{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:25px;
}

.logo{

  font-size:42px;

  font-weight:800;

  background:
    linear-gradient(
      90deg,
      #818CF8,
      #38BDF8
    );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;
}

.badge{

  background:
    rgba(255,255,255,0.06);

  padding:12px 18px;

  border-radius:999px;

  color:#CBD5E1;

  border:
    1px solid rgba(255,255,255,0.08);
}

.description{

  color:#94A3B8;

  line-height:1.8;

  font-size:17px;

  max-width:700px;
}

.stats{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(240px,1fr));

  gap:20px;

  margin-top:35px;
}

.stat-card{

  background:
    rgba(255,255,255,0.04);

  padding:26px;

  border-radius:24px;

  border:
    1px solid rgba(255,255,255,0.06);
}

.stat-label{

  color:#94A3B8;

  margin-bottom:12px;

  font-size:14px;
}

.stat-value{

  font-size:34px;

  font-weight:700;
}

.buttons{

  display:flex;

  gap:14px;

  flex-wrap:wrap;

  margin-top:35px;
}

button{

  border:none;

  padding:18px 24px;

  border-radius:18px;

  color:white;

  font-size:15px;

  font-weight:700;

  cursor:pointer;

  transition:0.3s;
}

button:hover{

  transform:translateY(-3px);
}

.start{

  background:
    linear-gradient(
      90deg,
      #4F46E5,
      #06B6D4
    );
}

.pause{

  background:#F59E0B;
}

.resume{

  background:#10B981;
}

.stop{

  background:#EF4444;
}

#status{

  margin-top:30px;

  background:
    rgba(255,255,255,0.04);

  padding:22px;

  border-radius:22px;

  color:#CBD5E1;

  border:
    1px solid rgba(255,255,255,0.06);
}

#map{

  height:550px;

  width:100%;

  margin-top:35px;

  border-radius:30px;

  overflow:hidden;

  border:
    1px solid rgba(255,255,255,0.08);
}

#summary{

  margin-top:35px;
}

.summary-card{

  background:
    rgba(255,255,255,0.04);

  border-radius:30px;

  padding:35px;

  border:
    1px solid rgba(255,255,255,0.08);
}

.summary-card h2{

  font-size:42px;

  margin-bottom:25px;
}

.summary-card p{

  color:#CBD5E1;

  margin-bottom:14px;

  line-height:1.7;
}

.street-list{

  margin-top:20px;

  padding:20px;

  border-radius:22px;

  background:
    rgba(255,255,255,0.03);
}

.street-item{

  margin-bottom:10px;

  color:#E2E8F0;
}

.leaflet-control-zoom{

  display:none;
}

@media(max-width:768px){

  .top{
    flex-direction:column;
    align-items:flex-start;
    gap:15px;
  }

  .logo{
    font-size:34px;
  }

  .buttons{
    flex-direction:column;
  }

  button{
    width:100%;
  }

  #map{
    height:420px;
  }
}

</style>

</head>

<body>

<div class="container">

  <div class="hero">

    <div class="top">

      <div class="logo">
        PNT GPS
      </div>

      <div class="badge">
        Tracking professionnel
      </div>

    </div>

    <div class="description">

      Système avancé de suivi GPS
      des tournées de distribution
      PNT Fly Dijon.

    </div>

    <div class="stats">

      <div class="stat-card">

        <div class="stat-label">
          Temps
        </div>

        <div class="stat-value" id="time">
          0 min
        </div>

      </div>

      <div class="stat-card">

        <div class="stat-label">
          Distance totale
        </div>

        <div class="stat-value" id="distance">
          0 km
        </div>

      </div>

      <div class="stat-card">

        <div class="stat-label">
          Rues parcourues
        </div>

        <div class="stat-value" id="streetCount">
          0
        </div>

      </div>

      <div class="stat-card">

        <div class="stat-label">
          Zones détectées
        </div>

        <div class="stat-value" id="districts">
          0
        </div>

      </div>

    </div>

    <div class="buttons">

      <button
      class="start"
      onclick="startTracking()">

        Démarrer

      </button>

      <button
      class="pause"
      onclick="pauseTracking()">

        Pause

      </button>

      <button
      class="resume"
      onclick="resumeTracking()">

        Reprendre

      </button>

      <button
      class="stop"
      onclick="stopTracking()">

        Terminer

      </button>

    </div>

    <div id="status">

      GPS inactif.

    </div>

    <div id="map"></div>

    <div id="summary"></div>

  </div>

</div>

<script>

const map = L.map('map',{

  zoomControl:false

}).setView(

  [47.322,5.041],
  13

);

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    attribution:'© OpenStreetMap'
  }
).addTo(map);

let polyline = L.polyline(
  [],
  {
    color:'#38BDF8',
    weight:6
  }
).addTo(map);

let tracking = false;

let paused = false;

let watchId = null;

let startTime = null;

let totalDistance = 0;

let lastPosition = null;

let streets = new Set();

let zones = new Set();

function calculateDistance(
  lat1,
  lon1,
  lat2,
  lon2
){

  const R = 6371;

  const dLat =
    (lat2-lat1) * Math.PI/180;

  const dLon =
    (lon2-lon1) * Math.PI/180;

  const a =

    Math.sin(dLat/2)
    *
    Math.sin(dLat/2)

    +

    Math.cos(lat1*Math.PI/180)

    *

    Math.cos(lat2*Math.PI/180)

    *

    Math.sin(dLon/2)

    *

    Math.sin(dLon/2);

  const c =
    2 * Math.atan2(
      Math.sqrt(a),
      Math.sqrt(1-a)
    );

  return R * c;
}

function updateTime(){

  if(!tracking || paused)
  return;

  const seconds =
    Math.floor(
      (Date.now()-startTime)
      / 1000
    );

  const minutes =
    Math.floor(seconds/60);

  document.getElementById("time")
  .innerText =
    minutes + " min";
}

setInterval(updateTime,1000);

async function reverseGeocode(
  lat,
  lng
){

  try{

    const response =
      await fetch(

      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`

    );

    const data =
      await response.json();

    if(data.address.road){

      streets.add(
        data.address.road
      );
    }

    const road =
      (
        data.address.road
        ||
        ""
      ).toLowerCase();

    if(
      road.includes("darcy")
      ||
      road.includes("république")
      ||
      road.includes("wilson")
      ||
      road.includes("monge")
    ){

      zones.add(
        "A - Centre-ville"
      );
    }

    if(
      road.includes("toison")
      ||
      road.includes("valmy")
      ||
      road.includes("europe")
    ){

      zones.add(
        "B - Toison d'Or / Nord"
      );
    }

    if(
      road.includes("université")
      ||
      road.includes("mansart")
      ||
      road.includes("chu")
    ){

      zones.add(
        "C - Université / Est"
      );
    }

    if(
      road.includes("talant")
      ||
      road.includes("fontaine")
    ){

      zones.add(
        "D - Talant / Fontaine"
      );
    }

    if(
      road.includes("chenôve")
      ||
      road.includes("bourroches")
      ||
      road.includes("longvic")
    ){

      zones.add(
        "E - Chenôve / Longvic"
      );
    }

    if(
      road.includes("quetigny")
      ||
      road.includes("chevigny")
    ){

      zones.add(
        "F - Quetigny / Chevigny"
      );
    }

    document.getElementById(
      "streetCount"
    ).innerText =
      streets.size;

    document.getElementById(
      "districts"
    ).innerText =
      zones.size;

  }catch(e){

    console.log(e);
  }
}

function startTracking(){

  if(tracking) return;

  tracking = true;

  paused = false;

  startTime = Date.now();

  document.getElementById(
    "status"
  ).innerText =
    "Tracking GPS actif...";

  watchId =
    navigator.geolocation.watchPosition(

    async(position)=>{

      if(paused) return;

      const lat =
        position.coords.latitude;

      const lng =
        position.coords.longitude;

      polyline.addLatLng([
        lat,
        lng
      ]);

      map.setView([
        lat,
        lng
      ],17);

      await reverseGeocode(
        lat,
        lng
      );

      if(lastPosition){

        totalDistance +=
          calculateDistance(

            lastPosition.lat,
            lastPosition.lng,

            lat,
            lng
          );
      }

      lastPosition = {
        lat,
        lng
      };

      document.getElementById(
        "distance"
      ).innerText =

        totalDistance.toFixed(2)
        + " km";

    },

    (error)=>{

      alert(error.message);

    },

    {

      enableHighAccuracy:true,
      maximumAge:0,
      timeout:5000

    }

  );
}

function pauseTracking(){

  paused = true;

  document.getElementById(
    "status"
  ).innerText =
    "Tracking en pause.";
}

function resumeTracking(){

  paused = false;

  document.getElementById(
    "status"
  ).innerText =
    "Tracking repris.";
}

function stopTracking(){

  tracking = false;

  navigator.geolocation.clearWatch(
    watchId
  );

  const duration =
    Math.floor(
      (
        Date.now()
        -
        startTime
      )
      /
      1000
      /
      60
    );

  document.getElementById(
    "status"
  ).innerText =
    "Mission terminée.";

  let streetsHtml = "";

  streets.forEach(street=>{

    streetsHtml +=
      `<div class="street-item">
        • ${street}
      </div>`;
  });

  let zonesHtml = "";

  zones.forEach(zone=>{

    zonesHtml +=
      `<div class="street-item">
        • ${zone}
      </div>`;
  });

  document.getElementById(
    "summary"
  ).innerHTML =

  `
  <div class="summary-card">

    <h2>
      Résumé de tournée
    </h2>

    <p>
      Temps total :
      ${duration} min
    </p>

    <p>
      Distance totale :
      ${totalDistance.toFixed(2)} km
    </p>

    <p>
      Nombre de rues :
      ${streets.size}
    </p>

    <p>
      Zones traversées :
      ${zones.size}
    </p>

    <div class="street-list">

      <h3>
        Zones détectées
      </h3>

      ${zonesHtml}

    </div>

    <div class="street-list">

      <h3>
        Rues parcourues
      </h3>

      ${streetsHtml}

    </div>

    <button
      class="start"
      onclick="exportPDF()"
      style="margin-top:25px;"
    >

      Export PDF

    </button>

  </div>
  `;
}

async function exportPDF(){

  const { jsPDF } =
    window.jspdf;

  const doc =
    new jsPDF(
      "portrait",
      "mm",
      "a4"
    );

  doc.setFont(
    "helvetica",
    "bold"
  );

  doc.setFontSize(24);

  doc.text(
    "PNT Fly Dijon",
    20,
    20
  );

  doc.setFontSize(13);

  doc.setFont(
    "helvetica",
    "normal"
  );

  doc.text(
    "Résumé complet de tournée",
    20,
    32
  );

  const duration =
    Math.floor(
      (
        Date.now()
        -
        startTime
      )
      /
      1000
      /
      60
    );

  doc.text(
    "Temps total : "
    +
    duration
    +
    " min",
    20,
    48
  );

  doc.text(
    "Distance totale : "
    +
    totalDistance.toFixed(2)
    +
    " km",
    20,
    58
  );

  doc.text(
    "Nombre de rues : "
    +
    streets.size,
    20,
    68
  );

  doc.text(
    "Zones détectées : "
    +
    zones.size,
    20,
    78
  );

  let zoneY = 92;

  doc.setFont(
    "helvetica",
    "bold"
  );

  doc.text(
    "Zones parcourues :",
    20,
    zoneY
  );

  zoneY += 10;

  doc.setFont(
    "helvetica",
    "normal"
  );

  zones.forEach(zone=>{

    doc.text(
      "• " + zone,
      25,
      zoneY
    );

    zoneY += 8;

  });

  const canvas =
    await html2canvas(
      document.getElementById("map"),
      {
        useCORS:true,
        allowTaint:true
      }
    );

  const imgData =
    canvas.toDataURL(
      "image/png"
    );

  doc.addImage(
    imgData,
    "PNG",
    15,
    120,
    180,
    90
  );

  let y = 225;

  doc.setFont(
    "helvetica",
    "bold"
  );

  doc.text(
    "Rues parcourues :",
    20,
    y
  );

  y += 10;

  doc.setFont(
    "helvetica",
    "normal"
  );

  streets.forEach(street=>{

    if(y > 275){

      doc.addPage();

      y = 20;
    }

    doc.text(
      "• " + street,
      20,
      y
    );

    y += 7;

  });

  doc.save(
    "pnt-tournee.pdf"
  );
}

</script>

</body>
</html>
